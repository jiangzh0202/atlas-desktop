<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>擎天 Atlas · 管理后台</title>
<style>
:root{--green:#7ecf5e;--green-dark:#5cb83a;--green-bg:#e8f7e2;--bg:#f2f2f4;--card:#fff;--border:#e5e5e7;--text:#1c1c1e;--muted:#6e6e73;--dim:#aeaeb2;--radius:12px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--card);padding:2.5rem 2rem;border-radius:20px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.login-card h1{font-size:1.5rem;margin-bottom:.25rem}
.login-card h1 span{color:var(--green)}
.login-card .sub{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
.login-card input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.95rem;text-align:center;outline:none;margin-bottom:.75rem}
.login-card input:focus{border-color:var(--green)}
.login-card button{width:100%;padding:.7rem;font-size:.95rem;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;background:var(--green);color:#fff}
.login-card .err{color:#e74c3c;font-size:.8rem;margin-top:.5rem;display:none}
.dash{display:none;max-width:1300px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.dash-header h1{font-size:1.3rem;display:flex;align-items:center;gap:.5rem}
.dash-header h1 span{color:var(--green)}
.dash-header nav{display:flex;gap:.5rem;align-items:center}
.dash-header nav button{color:var(--muted);font-size:.8rem;background:none;border:1px solid var(--border);padding:.35rem .8rem;border-radius:100px;cursor:pointer}
.dash-header nav button:hover{background:var(--bg)}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;flex-wrap:wrap}
.tab-btn{flex:1;min-width:100px;padding:.7rem;font-size:.85rem;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab-btn.active{background:var(--green);color:#fff}
.tab-content{display:none}.tab-content.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--card);padding:1rem;border-radius:var(--radius);border:1px solid var(--border);text-align:center}
.stat-card .num{font-size:1.6rem;font-weight:800;color:var(--green)}
.stat-card .label{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.table-wrap{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:.65rem 1rem;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);background:var(--bg);border-bottom:1px solid var(--border)}
td{padding:.6rem 1rem;font-size:.82rem;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:.65rem;font-weight:600;padding:.1rem .5rem;border-radius:100px}
.badge-active{background:var(--green-bg);color:var(--green-dark)}
.badge-free{background:#f0f0f0;color:var(--dim)}
.badge-paused{background:#fff3e0;color:#e65100}
.btn-sm{padding:.3rem .7rem;font-size:.7rem;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid;background:transparent}
.btn-sm.green{border-color:var(--green);color:var(--green)}
.btn-sm.red{border-color:#e74c3c;color:#e74c3c}
.btn-sm:hover.green{background:var(--green-bg)}
.btn-sm:hover.red{background:#fde8e8}
.btn-primary{padding:.6rem 1.2rem;font-size:.82rem;font-weight:600;border:none;border-radius:8px;cursor:pointer;background:var(--green);color:#fff}
.btn-secondary{padding:.6rem 1.2rem;font-size:.82rem;font-weight:600;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--card);color:var(--text)}
.form-group{margin-bottom:.75rem}
.form-group label{font-size:.72rem;color:var(--muted);display:block;margin-bottom:.25rem;font-weight:600}
.form-group input,.form-group select{width:100%;padding:.55rem .75rem;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--green)}
.row{display:flex;gap:.75rem;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-card{background:var(--card);padding:1.5rem;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.modal-card h3{margin-bottom:1rem}
.empty{text-align:center;padding:3rem;color:var(--dim)}
.toast{position:fixed;bottom:20px;right:20px;padding:.7rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:600;z-index:200;animation:slideUp .3s}
.toast.ok{background:var(--green);color:#fff}
.toast.err{background:#e74c3c;color:#fff}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1><span>擎天</span> Atlas</h1>
    <div class="sub">管理后台</div>
    <input type="email" id="loginEmail" placeholder="管理员邮箱" value="admin" onkeydown="if(event.key==='Enter')login()">
    <input type="password" id="loginPwd" placeholder="管理密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">进入后台</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="dash" id="dash">
  <div class="dash-header">
    <h1><span>擎天</span> Atlas · 管理后台</h1>
    <nav>
      <button onclick="location.reload()">🔄 刷新</button>
      <button onclick="logout()">🚪 退出</button>
    </nav>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('customers')">👥 客户管理</button>
    <button class="tab-btn" onclick="switchTab('agents')">🏪 代理管理</button>
    <button class="tab-btn" onclick="switchTab('models')">🤖 模型配置</button>
    <button class="tab-btn" onclick="switchTab('orders')">💰 订单管理</button>
    <button class="tab-btn" onclick="switchTab('plans')">📦 套餐配置</button>
  </div>

  <!-- ═══ 客户管理 ═══ -->
  <div class="tab-content active" id="tabCustomers">
    <div class="stats" id="customerStats"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>客户</th><th>公司</th><th>报价员</th><th>开发员</th><th>通道</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody id="customerTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ═══ 代理管理 ═══ -->
  <div class="tab-content" id="tabAgents">
    <div style="margin-bottom:1rem">
      <div class="stats" id="agentStats"></div>
      <div style="text-align:right;margin-top:.5rem"><button class="btn-primary" onclick="showAgentModal()">➕ 添加代理</button></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>代理</th><th>城市</th><th>等级</th><th>折扣</th><th>来源</th><th>客户数</th><th>销售额</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="agentTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ═══ 订单管理 ═══ -->
  <div class="tab-content" id="tabOrders">
    <div class="stats" id="orderStats"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>订单号</th><th>客户</th><th>套餐</th><th>金额</th><th>周期</th><th>状态</th><th>时间</th></tr></thead>
        <tbody id="orderTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ═══ 模型配置 ═══ -->
  <div class="tab-content" id="tabModels">
    <div id="modelConfigs"></div>
  </div>

  <!-- ═══ 套餐配置 ═══ -->
  <div class="tab-content" id="tabPlans">
    <div id="planConfigs"></div>
  </div>
</div>

<script>
const API = location.origin;
let TOKEN = localStorage.getItem('admin-token') || '';
let currentTab = 'customers';

// ═══ Auth ═══
async function login(){
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value.trim();
  if(!email||!pwd) return;
  try{
    const r = await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})});
    const d = await r.json();
    if(d.ok){ TOKEN=d.token; localStorage.setItem('admin-token',TOKEN); showDash(); }
    else{ document.getElementById('loginErr').textContent=d.error||'登录失败'; document.getElementById('loginErr').style.display='block'; }
  }catch(e){ document.getElementById('loginErr').textContent='网络错误'; document.getElementById('loginErr').style.display='block'; }
}
function logout(){ TOKEN=''; localStorage.removeItem('admin-token'); location.reload(); }
function showDash(){ document.getElementById('loginWrap').style.display='none'; document.getElementById('dash').style.display='block'; loadTab(currentTab); }
if(TOKEN) showDash();

// ═══ Tabs ═══
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab'+{customers:'Customers',agents:'Agents',orders:'Orders',models:'Models',plans:'Plans'}[tab]).classList.add('active');
  loadTab(tab);
}
function loadTab(tab){
  if(tab==='customers') loadCustomers();
  else if(tab==='agents') loadAgents();
  else if(tab==='orders') loadOrders();
  else if(tab==='models') loadModels();
  else if(tab==='plans') loadPlans();
}

// ═══ 客户管理 ═══
async function loadCustomers(){
  try{
    const r = await fetch(API+'/api/admin/users',{headers:{'Authorization':'Bearer '+TOKEN}});
    const d = await r.json();
    if(!d.ok) return toast('加载失败: '+(d.error||'无权限'),'err');
    const users = d.users||[];
    document.getElementById('customerStats').innerHTML =
      `<div class="stat-card"><div class="num">${users.length}</div><div class="label">总客户</div></div>
       <div class="stat-card"><div class="num">${users.filter(u=>(u.plan_quoter||'free')!=='free'||(u.plan_developer||'free')!=='free').length}</div><div class="label">付费客户</div></div>
       <div class="stat-card"><div class="num">${users.filter(u=>u.plan_quoter==='free'&&u.plan_developer==='free').length}</div><div class="label">免费客户</div></div>`;

    let rows = '';
    users.forEach(u=>{
      const qPlan = u.plan_quoter||'free', dPlan = u.plan_developer||'free';
      const chCount = (u.channels||[]).length;
      rows += `<tr>
        <td><b>${u.email}</b></td>
        <td>${u.company||'-'}</td>
        <td><span class="badge ${qPlan==='free'?'badge-free':'badge-active'}">${qPlan}</span></td>
        <td><span class="badge ${dPlan==='free'?'badge-free':'badge-active'}">${dPlan}</span></td>
        <td>${chCount} 通道</td>
        <td style="font-size:.72rem;color:var(--dim)">${(u.created_at||'').slice(0,10)}</td>
        <td>
          <button class="btn-sm green" onclick="showPlanModal('${u.id}','${u.email}','${qPlan}','${dPlan}')">改套餐</button>
        </td></tr>`;
    });
    document.getElementById('customerTable').innerHTML = rows || '<tr><td colspan="7" class="empty">暂无客户</td></tr>';
  }catch(e){ toast('加载客户失败: '+e.message,'err'); }
}

function showPlanModal(uid, email, qPlan, dPlan){
  const overlay = document.createElement('div'); overlay.className='modal-overlay';
  overlay.innerHTML = `<div class="modal-card">
    <h3>修改套餐 — ${email}</h3>
    <div class="form-group"><label>报价员套餐</label><select id="planQuoter"><option value="free" ${qPlan==='free'?'selected':''}>免费试用</option><option value="basic" ${qPlan==='basic'?'selected':''}>入门 ¥998/月</option><option value="standard" ${qPlan==='standard'?'selected':''}>标准 ¥2980/月</option><option value="pro" ${qPlan==='pro'?'selected':''}>专业 ¥5980/月</option></select></div>
    <div class="form-group"><label>客户开发员套餐</label><select id="planDeveloper"><option value="free" ${dPlan==='free'?'selected':''}>免费试用</option><option value="standard" ${dPlan==='standard'?'selected':''}>标准 ¥998/月</option><option value="pro" ${dPlan==='pro'?'selected':''}>专业 ¥3,980/月</option><option value="enterprise" ${dPlan==='enterprise'?'selected':''}>企业 ¥7,900/月</option></select></div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn-primary" id="btnSavePlan" style="flex:1">保存</button>
      <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
    </div></div>`;
  document.body.appendChild(overlay);
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  document.getElementById('btnSavePlan').onclick = async ()=>{
    const q = document.getElementById('planQuoter').value;
    const d = document.getElementById('planDeveloper').value;
    try{
      let ok=true;
      if(q!==qPlan){ const r=await fetch(API+'/api/admin/user/'+uid+'/plan',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({plan_type:'quoter',plan_key:q})}); if(!(await r.json()).ok) ok=false; }
      if(d!==dPlan){ const r=await fetch(API+'/api/admin/user/'+uid+'/plan',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({plan_type:'developer',plan_key:d})}); if(!(await r.json()).ok) ok=false; }
      toast(ok?'套餐已更新':'部分更新失败',ok?'ok':'err');
      overlay.remove();
      loadCustomers();
    }catch(e){ toast('网络错误','err'); }
  };
}

// ═══ 代理管理 ═══
async function loadAgents(){
  try{
    const r = await fetch(API+'/api/admin/agents',{headers:{'Authorization':'Bearer '+TOKEN}});
    const d = await r.json();
    const agents = d.agents||[];
    document.getElementById('agentStats').innerHTML =
      `<div class="stat-card"><div class="num">${agents.length}</div><div class="label">代理总数</div></div>
       <div class="stat-card"><div class="num">${agents.filter(a=>a.status==='active').length}</div><div class="label">活跃</div></div>
       <div class="stat-card"><div class="num">¥${agents.reduce((s,a)=>s+(a.total_sales||0),0).toLocaleString()}</div><div class="label">总销售额</div></div>`;
    let rows = '';
    agents.forEach(a=>{
      rows += `<tr>
        <td><b>${a.name}</b><br><span style="font-size:.68rem;color:var(--dim)">${a.phone||''} ${a.wechat||''}</span></td>
        <td>${a.city||'-'}</td>
        <td><span class="badge badge-active">${a.level==='city'?'🥇城市总代':a.level==='regional'?'🥈区域代理':'🥉推广大使'}</span></td>
        <td>${Math.round((a.discount||0.85)*100)}折</td>
        <td><span style="font-size:.7rem;color:var(--dim)">${a.source==='auto_upgrade'?'🎖️自动':'👤手动'}</span></td>
        <td>${(a.customers||[]).length}客户</td>
        <td>¥${(a.total_sales||0).toLocaleString()}<br><span style="font-size:.65rem;color:var(--dim)">目标¥${(a.min_sales||0).toLocaleString()}</span></td>
        <td><span class="badge ${a.status==='active'?'badge-active':'badge-paused'}">${a.status==='active'?'正常':'暂停'}</span></td>
        <td>
          <button class="btn-sm green" onclick="showAgentModal('${a.id}')">编辑</button>
          <button class="btn-sm red" onclick="deleteAgent('${a.id}')">删除</button>
        </td></tr>`;
    });
    document.getElementById('agentTable').innerHTML = rows || '<tr><td colspan="8" class="empty">暂无代理</td></tr>';
  }catch(e){ toast('加载代理失败','err'); }
}

function showAgentModal(id){
  const isEdit = !!id;
  let agent = {};
  if(isEdit){
    fetch(API+'/api/admin/agents',{headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>r.json()).then(d=>{
      agent = (d.agents||[]).find(a=>a.id===id)||{};
      buildModal(agent);
    });
  }else{ buildModal(agent); }

  function buildModal(a){
    const overlay = document.createElement('div'); overlay.className='modal-overlay';
    overlay.innerHTML = `<div class="modal-card">
      <h3>${isEdit?'编辑':'添加'}代理</h3>
      <div class="row">
        <div class="form-group"><label>姓名</label><input id="agtName" value="${a.name||''}"></div>
        <div class="form-group"><label>城市</label><input id="agtCity" value="${a.city||''}"></div>
      </div>
      <div class="row">
        <div class="form-group"><label>电话</label><input id="agtPhone" value="${a.phone||''}"></div>
        <div class="form-group"><label>微信</label><input id="agtWechat" value="${a.wechat||''}"></div>
      </div>
      <div class="row">
        <div class="form-group"><label>等级</label><select id="agtLevel" onchange="onLevelChange()"><option value="city" ${a.level==='city'?'selected':''}>🥇 城市总代 (6折)</option><option value="regional" ${a.level==='regional'?'selected':''}>🥈 区域代理 (8折)</option><option value="ambassador" ${(a.level||'ambassador')==='ambassador'?'selected':''}>🥉 推广大使 (8.5折)</option></select></div>
        <div class="form-group"><label>折扣</label><input id="agtDiscount" type="number" step="0.05" min="0" max="1" value="${a.discount||0.85}" readonly style="background:var(--bg);color:var(--muted)"></div>
      </div>
      <div style="background:var(--green-bg);padding:10px 12px;border-radius:8px;margin-bottom:.75rem;font-size:.76rem">
        <b id="levelInfo">城市总代</b>：预付 <b id="depositShow">¥20,000</b> 或一次买 <b id="bulkShow">10</b> 套年付 · 年最低销售额 <b id="minSalesShow">¥100,000</b>
      </div>
      <div class="row">
        <div class="form-group"><label>预付金额 ¥</label><input id="agtDeposit" type="number" value="${a.deposit||0}" placeholder="0 表示按套餐量入门"></div>
        <div class="form-group"><label>或一次买 (套)</label><input id="agtBulk" type="number" value="${a.bulk_count||0}" placeholder="0 表示按预付金入门"></div>
      </div>
      <div class="row">
        <div class="form-group"><label>年最低销售额 ¥</label><input id="agtMinSales" type="number" value="${a.min_sales||0}"></div>
        <div class="form-group"><label>试用期 (月)</label><input id="agtTrial" type="number" value="${a.trial_months||3}" min="1" max="12"></div>
      </div>
      ${isEdit?`<div class="form-group"><label>状态</label><select id="agtStatus"><option value="active" ${a.status==='active'?'selected':''}>正常</option><option value="paused" ${a.status==='paused'?'selected':''}>暂停</option></select></div>`:''}
      <div style="display:flex;gap:8px;margin-top:1rem">
        <button class="btn-primary" id="btnSaveAgent" style="flex:1">${isEdit?'保存修改':'添加代理'}</button>
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
      </div></div>`;
    document.body.appendChild(overlay);
    overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
    // Auto-fill discount based on level
    const LEVEL_DEFAULTS = {
      city: {discount:0.60, deposit:20000, bulk:10, min_sales:100000, name:'城市总代'},
      regional: {discount:0.80, deposit:8000, bulk:4, min_sales:40000, name:'区域代理'},
      ambassador: {discount:0.85, deposit:2000, bulk:1, min_sales:10000, name:'推广大使'},
    };
    function fillLevelDefaults(){
      const lv = document.getElementById('agtLevel').value;
      const def = LEVEL_DEFAULTS[lv]||LEVEL_DEFAULTS.ambassador;
      document.getElementById('agtDiscount').value = def.discount;
      document.getElementById('agtDeposit').value = document.getElementById('agtDeposit').value||def.deposit;
      document.getElementById('agtBulk').value = document.getElementById('agtBulk').value||def.bulk;
      document.getElementById('agtMinSales').value = document.getElementById('agtMinSales').value||def.min_sales;
      document.getElementById('levelInfo').textContent = def.name;
      document.getElementById('depositShow').textContent = '¥' + def.deposit.toLocaleString();
      document.getElementById('bulkShow').textContent = def.bulk;
      document.getElementById('minSalesShow').textContent = '¥' + def.min_sales.toLocaleString();
    }
    window.onLevelChange = fillLevelDefaults;
    fillLevelDefaults();
    document.getElementById('btnSaveAgent').onclick = async ()=>{
      const data = {
        name: document.getElementById('agtName').value,
        city: document.getElementById('agtCity').value,
        phone: document.getElementById('agtPhone').value,
        wechat: document.getElementById('agtWechat').value,
        level: document.getElementById('agtLevel').value,
        discount: parseFloat(document.getElementById('agtDiscount').value)||0.85,
        deposit: parseInt(document.getElementById('agtDeposit').value)||0,
        bulk_count: parseInt(document.getElementById('agtBulk').value)||0,
        min_sales: parseInt(document.getElementById('agtMinSales').value)||0,
        trial_months: parseInt(document.getElementById('agtTrial').value)||3,
      };
      if(isEdit) data.status = document.getElementById('agtStatus').value;
      try{
        const url = isEdit ? API+'/api/admin/agent/'+id : API+'/api/admin/agents';
        const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify(data)});
        const d = await r.json();
        toast(d.ok?'保存成功':'保存失败','ok');
        overlay.remove();
        loadAgents();
      }catch(e){ toast('网络错误','err'); }
    };
  }
}

async function deleteAgent(id){
  if(!confirm('确定删除该代理？')) return;
  try{
    await fetch(API+'/api/admin/agent/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+TOKEN}});
    toast('已删除','ok');
    loadAgents();
  }catch(e){ toast('删除失败','err'); }
}

// ═══ 订单管理 ═══
async function loadOrders(){
  try{
    const r = await fetch(API+'/api/admin/orders',{headers:{'Authorization':'Bearer '+TOKEN}});
    const d = await r.json();
    if(!d.ok) return toast('加载失败','err');
    const orders = d.orders||[];
    const paid = orders.filter(o=>o.status==='paid');
    const totalRev = paid.reduce((s,o)=>s+(o.amount||0),0);
    document.getElementById('orderStats').innerHTML =
      `<div class="stat-card"><div class="num">${orders.length}</div><div class="label">总订单</div></div>
       <div class="stat-card"><div class="num">${paid.length}</div><div class="label">已付款</div></div>
       <div class="stat-card"><div class="num">¥${totalRev.toLocaleString()}</div><div class="label">已收款</div></div>`;
    let rows = '';
    orders.forEach(o=>{
      const statusBadge = o.status==='paid'?'badge-active':'badge-free';
      const statusText = o.status==='paid'?'已付':o.status==='pending'?'待付':o.status||'-';
      rows += `<tr>
        <td style="font-size:.7rem;color:var(--dim)">${o.id}</td>
        <td>${o.user_email||'-'}</td>
        <td>${o.item_name||(o.plan_type+':'+o.plan)}</td>
        <td>¥${(o.amount||0).toLocaleString()}</td>
        <td>${o.period==='year'?'年付':'月付'}</td>
        <td><span class="badge ${statusBadge}">${statusText}</span></td>
        <td style="font-size:.7rem;color:var(--dim)">${(o.created_at||'').slice(0,10)}</td></tr>`;
    });
    document.getElementById('orderTable').innerHTML = rows || '<tr><td colspan="7" class="empty">暂无订单</td></tr>';
  }catch(e){ toast('加载订单失败','err'); }
}

// ═══ 模型配置 ═══
async function loadModels(){
  try{
    const [mr, pr] = await Promise.all([
      fetch(API+'/api/admin/models',{headers:{'Authorization':'Bearer '+TOKEN}}),
      fetch(API+'/api/admin/plans')
    ]);
    const md = await mr.json();
    const pd = await pr.json();
    const config = md.config||{};
    const plans = pd.plans||{};
    const allTiers = {};
    ['quoter','developer'].forEach(type=>{
      Object.entries(plans[type]||{}).forEach(([k,v])=>{
        if(!allTiers[k]) allTiers[k] = {key:k, name:v.name, price:v.price_month, type};
      });
    });
    const tiers = Object.values(allTiers);
    let h = '';
    tiers.forEach(t=>{
      const c = config[t.key]||{};
      const priceLabel = t.price ? '¥'+t.price.toLocaleString()+'/月' : '免费';
      h += `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.75rem">
        <div style="font-weight:700;margin-bottom:.5rem">${t.name} <span style="font-weight:400;color:var(--muted);font-size:.8rem">${priceLabel} · ${t.type==='quoter'?'报价员':'开发员'}</span></div>
        <div class="row">
          <div class="form-group"><label>模型</label><select id="model_${t.key}"><option value="deepseek-chat" ${c.model==='deepseek-chat'?'selected':''}>DeepSeek V3</option><option value="deepseek-v4-pro" ${c.model==='deepseek-v4-pro'?'selected':''}>DeepSeek V4 Pro</option></select></div>
          <div class="form-group"><label>Temperature</label><input id="temp_${t.key}" type="number" step="0.1" min="0" max="2" value="${c.temperature||0.7}"></div>
          <div class="form-group"><label>Max Tokens</label><input id="tokens_${t.key}" type="number" step="100" min="500" max="8000" value="${c.max_tokens||1500}"></div>
        </div>
        <button class="btn-sm green" style="margin-top:.5rem" onclick="saveModelConfig('${t.key}')">💾 保存 ${t.name}</button>
      </div>`;
    });
    document.getElementById('modelConfigs').innerHTML = h || '<div class="empty">暂无套餐档位</div>';
  }catch(e){ toast('加载模型配置失败','err'); }
}
async function saveModelConfig(tier){
  const cfg = {
    model: document.getElementById('model_'+tier).value,
    temperature: parseFloat(document.getElementById('temp_'+tier).value)||0.7,
    max_tokens: parseInt(document.getElementById('tokens_'+tier).value)||1500,
  };
  try{
    const r = await fetch(API+'/api/admin/models',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({tier,...cfg})});
    const d = await r.json();
    toast(d.ok?'模型配置已保存':'保存失败',d.ok?'ok':'err');
  }catch(e){ toast('网络错误','err'); }
}

// ═══ 套餐配置（可编辑）═══
async function loadPlans(){
  try{
    const r = await fetch(API+'/api/admin/plans');
    const d = await r.json();
    const plans = d.plans||{};
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h3 style="margin:0">📦 套餐配置</h3><button class="btn-sm" style="border-color:var(--dim);color:var(--dim)" onclick="resetPlans()">🔄 恢复默认</button></div>';
    ['quoter','developer'].forEach(type=>{
      const typePlans = plans[type]||{};
      const name = type==='quoter'?'报价员':'客户开发员';
      h += `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem" data-type="${type}">
        <div style="font-weight:700;margin-bottom:.75rem">${name==='报价员'?'📜':'🎯'} ${name}<button class="btn-sm green" style="margin-left:8px" onclick="showAddPlanModal('${type}')">➕ 添加档位</button></div>
        <table><thead><tr><th>档位Key</th><th>名称</th><th>月价¥</th><th>年价¥</th><th>配额</th><th>通道</th><th>操作</th></tr></thead><tbody>`;
      Object.entries(typePlans).forEach(([k,v])=>{
        h += `<tr>
          <td><code style="font-size:.72rem">${k}</code></td>
          <td><input value="${v.name||''}" onchange="updatePlanField('${type}','${k}','name',this.value)" style="width:90px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem"></td>
          <td><input type="number" value="${v.price_month||0}" onchange="updatePlanField('${type}','${k}','price_month',this.value)" style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem"></td>
          <td><input type="number" value="${v.price_year||0}" onchange="updatePlanField('${type}','${k}','price_year',this.value)" style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem"></td>
          <td><input type="number" value="${v.quota||0}" onchange="updatePlanField('${type}','${k}','quota',this.value)" style="width:55px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem"></td>
          <td><input type="number" value="${v.max_channels||0}" onchange="updatePlanField('${type}','${k}','max_channels',this.value)" style="width:45px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem"></td>
          <td><button class="btn-sm red" onclick="deletePlanTier('${type}','${k}')">删除</button></td></tr>`;
      });
      h += `</tbody></table></div>`;
    });
    document.getElementById('planConfigs').innerHTML = h;
  }catch(e){ toast('加载套餐配置失败','err'); }
}

async function updatePlanField(type, tierKey, field, value){
  const data = {};
  data[field] = field.includes('price')||field==='quota'||field==='max_channels' ? parseInt(value)||0 : value;
  try{
    await fetch(API+'/api/admin/plan/'+type+'/'+tierKey,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify(data)});
  }catch(e){}
}

async function deletePlanTier(type, tierKey){
  if(!confirm('删除 '+tierKey+' 档位？')) return;
  try{
    await fetch(API+'/api/admin/plan-delete/'+type+'/'+tierKey,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN}});
    toast('已删除','ok');
    loadPlans();
  }catch(e){ toast('删除失败','err'); }
}

function showAddPlanModal(type){
  const overlay = document.createElement('div'); overlay.className='modal-overlay';
  overlay.innerHTML = `<div class="modal-card">
    <h3>添加套餐档位 — ${type==='quoter'?'报价员':'客户开发员'}</h3>
    <div class="row">
      <div class="form-group"><label>档位Key</label><input id="newTierKey" placeholder="enterprise"></div>
      <div class="form-group"><label>名称</label><input id="newName" placeholder="企业版"></div>
    </div>
    <div class="row">
      <div class="form-group"><label>月价 ¥</label><input id="newPriceM" type="number" value="0"></div>
      <div class="form-group"><label>年价 ¥</label><input id="newPriceY" type="number" value="0"></div>
    </div>
    <div class="row">
      <div class="form-group"><label>配额</label><input id="newQuota" type="number" value="100"></div>
      <div class="form-group"><label>通道数</label><input id="newChannels" type="number" value="3"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn-primary" id="btnAddPlan" style="flex:1">添加</button>
      <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
    </div></div>`;
  document.body.appendChild(overlay);
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  document.getElementById('btnAddPlan').onclick = async ()=>{
    const data = {
      type, tierKey: document.getElementById('newTierKey').value,
      name: document.getElementById('newName').value,
      price_month: parseInt(document.getElementById('newPriceM').value)||0,
      price_year: parseInt(document.getElementById('newPriceY').value)||0,
      quota: parseInt(document.getElementById('newQuota').value)||100,
      max_channels: parseInt(document.getElementById('newChannels').value)||0,
    };
    if(!data.tierKey||!data.name) return toast('请填写档位Key和名称','err');
    try{
      const r = await fetch(API+'/api/admin/plan-add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify(data)});
      const d = await r.json();
      toast(d.ok?'添加成功':'添加失败',d.ok?'ok':'err');
      overlay.remove();
      loadPlans();
    }catch(e){ toast('网络错误','err'); }
  };
}

async function resetPlans(){
  if(!confirm('恢复默认套餐？所有修改将丢失。')) return;
  try{ await fetch(API+'/api/admin/plans-reset',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN}}); toast('已恢复默认','ok'); loadPlans(); }
  catch(e){ toast('恢复失败','err'); }
}

// ═══ 工具 ═══
function toast(msg,type){ const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000); }
</script>
</body>
</html>
