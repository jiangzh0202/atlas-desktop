<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — 擎天 Atlas</title>
<style>
:root{--bg:#0a0a0a;--card:#141414;--border:#2a2a2a;--text:#f0f0f0;--muted:#888;--green:#00ff88}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;margin:20px}
.login-card h1{font-size:1.4rem;margin-bottom:6px}
.login-card h1 span{color:var(--green)}
.login-card .sub{color:var(--muted);font-size:.85rem;margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;outline:none;font-family:inherit}
.field input:focus{border-color:var(--green)}
.btn{display:block;width:100%;padding:12px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;border:none;margin-top:8px}
.btn-p{background:var(--green);color:var(--bg)}
.btn-p:hover{opacity:.9}
.err{color:#ff4444;font-size:.82rem;margin-top:12px;display:none}
.back{text-align:center;margin-top:20px}
.back a{color:var(--muted);font-size:.85rem;text-decoration:none}
</style>
</head>
<body>
<div class="login-card">
  <h1><span>擎天</span> Atlas</h1>
  <p class="sub">登录你的账号</p>
  <div class="field"><label>邮箱</label><input type="email" id="email" placeholder="your@company.com" autofocus></div>
  <div class="field"><label>密码</label><input type="password" id="pass" placeholder="输入密码"></div>
  <div class="err" id="err"></div>
  <button class="btn btn-p" onclick="doLogin()" id="btn">登录</button>
  <div class="back"><a href="/">← 返回首页</a></div>
</div>
<script>
const API = '';
const isClient = new URLSearchParams(location.search).get('client') === 'atlas';

async function doLogin() {
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  const email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value.trim();
  if(!email||!pass){err.textContent='请输入邮箱和密码';err.style.display='block';return}
  btn.textContent='登录中...';btn.disabled=true;
  try{
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(d.ok){
      localStorage.setItem('atlas_token',d.token);
      localStorage.setItem('atlas_user',JSON.stringify(d.user));
      if(isClient){
        const r2=await fetch(API+'/api/oauth/token',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+d.token}});
        const d2=await r2.json();
        if(d2.ok) location.href = 'atlas://auth?token='+encodeURIComponent(d2.token);
        else location.href='/dashboard';
      } else {
        location.href='/dashboard';
      }
    }else{err.textContent=d.error||'登录失败';err.style.display='block'}
  }catch(e){err.textContent='网络错误';err.style.display='block'}
  btn.textContent='登录';btn.disabled=false;
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
