<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>库存看板 · 擎天擎天</title>
<style>
:root{--bg:#f2f2f4;--card:#fff;--green:#7ecf5e;--text:#1a1a2e;--muted:#888;--red:#e94560;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar .logo{font-size:1.1rem;font-weight:700}
.topbar .logo a{text-decoration:none;color:inherit}
.topbar .logo span{color:var(--green)}
.topbar nav a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:8px}
.topbar nav a:hover{color:var(--text)}
.badge{display:inline-block;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:4px;min-width:18px;text-align:center;line-height:1.4}
.container{max-width:960px;margin:0 auto;padding:20px}
.card{background:var(--card);border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:1.05rem;margin-bottom:14px;color:var(--text)}
.btn{display:inline-block;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;text-align:center;transition:all .15s}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{opacity:.9}
.btn-s{background:var(--bg);color:var(--text);border:1px solid #ddd}.btn-s:hover{background:#e8e8ea}
.btn-a{background:var(--red);color:#fff}.btn-a:hover{opacity:.9}
input,select{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:.9rem;font-family:inherit;outline:none}
input:focus{border-color:var(--green)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--bg);padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #eee;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
tr.row-warn{background:#fff0f0}
tr.row-warn td{color:var(--red);font-weight:600}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.status-ok{background:var(--green)}
.status-warn{background:var(--red)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:.85rem}
.summary{display:flex;gap:16px;margin-bottom:16px}
.summary-item{flex:1;background:var(--bg);border-radius:10px;padding:14px 16px;text-align:center}
.summary-item .num{font-size:1.4rem;font-weight:700}
.summary-item .label{font-size:.75rem;color:var(--muted);margin-top:2px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ─── Toolbar: search + toggle in one row ─── */
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center}
.toolbar input{flex:1}
.toggle-group{display:flex;border-radius:10px;overflow:hidden;border:1px solid #ddd;flex-shrink:0}
.toggle-btn{padding:10px 18px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:var(--card);color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap}
.toggle-btn.active{background:var(--green);color:#fff}
.toggle-btn:first-child{border-right:1px solid #ddd}
/* ─── Pagination ─── */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:16px}
.pagination button{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:var(--card);color:var(--text);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.pagination button:hover:not(:disabled){background:var(--bg)}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .page-info{font-size:.8rem;color:var(--muted);padding:0 8px}
.pagination .page-num{display:inline-block;width:34px;height:34px;line-height:34px;text-align:center;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid #ddd;background:var(--card);color:var(--text);transition:all .15s}
.pagination .page-num.active{background:var(--green);color:#fff;border-color:var(--green)}
.pagination .page-num:hover:not(.active){background:var(--bg)}
</style>
</head>
<body>
<script src="/atlas.js"></script>
<div class="topbar">
  <div class="logo"><a href="/"><span>擎天</span>·擎天</a></div>
  
</div>
<div class="container">
  <div class="card">
    <h2>📦 库存看板 <span id="alertBadge" class="badge" style="display:none">0</span></h2>
    <div id="summary" class="summary"></div>

    <!-- Toolbar: search + alert toggle -->
    <div class="toolbar">
      <input id="sq" placeholder="输入 OE号 或 品名 筛选项..." oninput="onFilterChange()">
      <div class="toggle-group">
        <button class="toggle-btn active" id="toggleAll" onclick="setAlertFilter(false)">📋 全部</button>
        <button class="toggle-btn" id="toggleAlert" onclick="setAlertFilter(true)">⚠️ 仅看预警</button>
      </div>
    </div>

    <div id="tableWrap"><div class="empty"><span class="spin"></span> 正在加载库存数据...</div></div>
    <div id="paginationWrap"></div>
  </div>
</div>
<script>
// ─── State ───
var allData=[], alerts=0, filteredData=[];
var alertOnly=false, currentPage=1, pageSize=20;
if(!getToken())location='/login';
function logout(){localStorage.removeItem('atlas_token');location='/login'}

// ─── Load ───
async function loadStock(){
  try{
    var r=await api('GET', '/api/stock');
    var d=await r.json();
    if(d.ok){
      allData=d.data||[];
      alerts=d.alerts||0;
      // Recalculate alerts from data if needed (belt-and-suspenders)
      if(!alerts){
        alerts=allData.filter(function(x){return x.quantity <= x.safety_line}).length;
      }
      renderSummary();
      onFilterChange();
      var badge=document.getElementById('alertBadge');
      if(alerts>0){badge.style.display='inline-block';badge.textContent=alerts}else{badge.style.display='none'}
    }else{
      document.getElementById('tableWrap').innerHTML='<div class="empty">加载失败：'+ (d.error||'未知错误') +'</div>';
    }
  }catch(e){
    document.getElementById('tableWrap').innerHTML='<div class="empty">连接失败，请检查服务是否启动</div>';
  }
}

// ─── Summary ───
function renderSummary(){
  var total=allData.length;
  var normal=allData.filter(function(x){return x.quantity > x.safety_line}).length;
  var warn=alerts;
  document.getElementById('summary').innerHTML=
    '<div class="summary-item"><div class="num" style="color:var(--text)">'+total+'</div><div class="label">库存品类</div></div>'+
    '<div class="summary-item"><div class="num" style="color:var(--green)">'+normal+'</div><div class="label">库存正常</div></div>'+
    '<div class="summary-item"><div class="num" style="color:var(--red)">'+warn+'</div><div class="label">需要补货</div></div>';
}

// ─── Filtering ───
function onFilterChange(){
  currentPage=1;
  applyFilters();
}

function setAlertFilter(v){
  alertOnly=v;
  document.getElementById('toggleAll').classList.toggle('active',!v);
  document.getElementById('toggleAlert').classList.toggle('active',v);
  currentPage=1;
  applyFilters();
}

function applyFilters(){
  var q=(document.getElementById('sq').value||'').toLowerCase().trim();

  filteredData=allData.filter(function(p){
    // Alert filter
    if(alertOnly && p.quantity > p.safety_line) return false;
    // Search filter — match part_oe or name_cn
    if(q){
      var oe=(p.part_oe||'').toLowerCase();
      var name=(p.name_cn||'').toLowerCase();
      return oe.indexOf(q)>=0 || name.indexOf(q)>=0;
    }
    return true;
  });

  renderTable(filteredData);
  renderPagination(filteredData);
}

// ─── Table ───
function renderTable(data){
  if(!data.length){
    document.getElementById('tableWrap').innerHTML='<div class="empty">暂无匹配的库存数据</div>';
    return;
  }
  var totalPages=Math.ceil(data.length/pageSize);
  if(currentPage>totalPages) currentPage=totalPages;
  var start=(currentPage-1)*pageSize;
  var page=data.slice(start, start+pageSize);

  var rows=page.map(function(p){
    var qty=p.quantity||0;
    var safety=p.safety_line||0;
    var below=qty<=safety;
    var statusHtml=below?'<span class="status-dot status-warn"></span>需要补货':'<span class="status-dot status-ok"></span>库存充足';
    var rowClass=below?' class="row-warn"':'';
    var brand=p.brand_channel||'-';
    return '<tr'+rowClass+'><td>'+esc(p.part_oe||'-')+'</td><td>'+esc(p.name_cn||'-')+'</td><td>'+qty+'</td><td>'+safety+'</td><td>'+esc(brand)+'</td><td>'+statusHtml+'</td></tr>';
  }).join('');

  document.getElementById('tableWrap').innerHTML='<table><tr><th>OE号</th><th>品名</th><th>库存量</th><th>安全库存线</th><th>品牌渠道</th><th>状态</th></tr>'+rows+'</table>';
}

// ─── Pagination ───
function renderPagination(data){
  var wrap=document.getElementById('paginationWrap');
  if(!data.length){ wrap.innerHTML=''; return; }

  var totalPages=Math.ceil(data.length/pageSize);
  if(totalPages<=1){ wrap.innerHTML=''; return; }
  if(currentPage>totalPages) currentPage=totalPages;

  var html='<div class="pagination">';
  html+='<button onclick="goPage('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>◀ 上一页</button>';

  // Page number buttons
  var startPage=Math.max(1, currentPage-2);
  var endPage=Math.min(totalPages, currentPage+2);
  if(startPage>1){
    html+='<span class="page-num" onclick="goPage(1)">1</span>';
    if(startPage>2) html+='<span style="color:var(--muted);padding:0 2px">…</span>';
  }
  for(var i=startPage;i<=endPage;i++){
    html+='<span class="page-num'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</span>';
  }
  if(endPage<totalPages){
    if(endPage<totalPages-1) html+='<span style="color:var(--muted);padding:0 2px">…</span>';
    html+='<span class="page-num" onclick="goPage('+totalPages+')">'+totalPages+'</span>';
  }

  html+='<button onclick="goPage('+(currentPage+1)+')" '+(currentPage>=totalPages?'disabled':'')+'>下一页 ▶</button>';
  html+='<span class="page-info">共 '+data.length+' 条 / '+totalPages+' 页</span>';
  html+='</div>';
  wrap.innerHTML=html;
}

function goPage(p){
  var totalPages=Math.ceil(filteredData.length/pageSize);
  if(p<1||p>totalPages) return;
  currentPage=p;
  renderTable(filteredData);
  renderPagination(filteredData);
  // Scroll to top of table
  document.getElementById('tableWrap').scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── Helpers ───
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ─── Init ───
loadStock();
</script>

<script>initAtlas("stock")</script>
</body></html>
