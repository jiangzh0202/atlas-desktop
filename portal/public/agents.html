<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>智能体监控 · 元策擎天</title>
<style>
:root{--bg:#f2f2f4;--card:#fff;--green:#7ecf5e;--green-soft:#e8f7e0;--text:#1a1a2e;--muted:#888;--red:#e94560;--amber:#f59e0b;--blue:#3b82f6;--line:rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--green);text-decoration:none}
.topbar{background:var(--card);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar .logo{font-size:1.2rem;font-weight:700}
.topbar .logo span{color:var(--green)}
.topbar nav{display:flex;gap:4px;flex-wrap:wrap}
.topbar nav a{color:var(--muted);text-decoration:none;font-size:.82rem;padding:6px 12px;border-radius:8px;transition:all .15s}
.topbar nav a:hover,.topbar nav a.active{background:var(--green-soft);color:var(--green)}
.container{max-width:1040px;margin:0 auto;padding:20px 24px}
/* Agent grid */
.agent-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
@media(max-width:768px){.agent-grid{grid-template-columns:1fr}}
.agent-card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--line);transition:box-shadow .15s}
.agent-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.agent-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.agent-header .name{font-size:.95rem;font-weight:700}
.agent-header .type{font-size:.7rem;color:var(--muted);margin-top:2px}
.agent-desc{font-size:.78rem;color:var(--muted);margin-bottom:12px;line-height:1.4}
.agent-stats{display:flex;gap:16px;font-size:.78rem;color:var(--muted)}
.agent-stats .stat{display:flex;flex-direction:column}
.agent-stats .stat .val{font-size:1.1rem;font-weight:700;color:var(--text)}
/* Status indicators */
.status-dot{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
.status-idle{background:var(--green-soft);color:var(--green)}
.status-running{background:#dbeafe;color:var(--blue)}
.status-error{background:#fee2e2;color:var(--red)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-idle{background:var(--green)}
.dot-running{background:var(--blue);animation:pulse 1s infinite}
.dot-error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Log */
.card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--line);margin-bottom:16px}
.card h2{font-size:1.05rem;margin-bottom:14px}
.log-entry{padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:.8rem;display:flex;align-items:center;gap:10px}
.log-entry:hover{background:#fafafa}
.log-time{font-size:.7rem;color:var(--muted);min-width:50px}
.log-agent{font-size:.72rem;padding:2px 6px;border-radius:6px;font-weight:600;min-width:80px;text-align:center}
.log-msg{flex:1;font-size:.78rem}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--green);color:#fff}
.btn-p:hover{opacity:.9}
.btn-s{background:var(--bg);color:var(--text);border:1px solid #ddd}
.btn-s:hover{background:#e8e8ea}
.btn-xs{padding:4px 10px;font-size:.72rem}
.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.auto-refresh{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:8px}
.auto-refresh input{margin-right:4px}
</style></head>
<body>
<div class="topbar">
  <div class="logo"><span>元策</span>·擎天</div>
  <nav>
    <a href="/">📊 首页</a><a href="/quotation">📋 报价</a><a href="/parts">🔧 配件</a>
    <a href="/customers">👥 客户</a><a href="/rules">📐 规则</a>
    <a href="/history">📜 历史</a><a href="/stock">📦 库存</a>
    <a href="/agents" class="active">🤖 智能体</a><a href="/trade">🌍 贸易</a>
    <a href="#" onclick="logout()" style="color:var(--red)">退出</a>
  </nav>
</div>

<div class="container">
  <div class="refresh-bar">
    <h1 style="font-size:1.2rem">🤖 智能体监控</h1>
    <div class="auto-refresh">
      <label><input type="checkbox" id="autoRefresh" onchange="toggleAuto()" checked> 自动刷新</label>
      <span id="refreshCountdown" style="color:var(--muted)">10s</span>
      <button class="btn btn-s btn-xs" onclick="refreshAll()">🔄 立即刷新</button>
    </div>
  </div>

  <div class="agent-grid" id="agentGrid">
    <div class="agent-card"><div style="text-align:center;color:var(--muted);padding:30px">加载中...</div></div>
  </div>

  <!-- Event Trigger -->
  <div class="card">
    <h2>⚡ 手动触发事件</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <select id="eventType" style="padding:8px 12px;border:1px solid #ddd;border-radius:10px;font-size:.85rem">
        <option value="inquiry">📨 模拟询盘</option>
        <option value="quote_complete">✅ 模拟报价完成</option>
      </select>
      <button class="btn btn-p" onclick="triggerEvent()">▶ 触发</button>
      <span id="triggerResult" style="font-size:.8rem;color:var(--muted)"></span>
    </div>
  </div>

  <!-- Activity Log -->
  <div class="card">
    <h2>📋 智能体活动日志</h2>
    <div id="logList">
      <div style="text-align:center;color:var(--muted);padding:30px">加载中...</div>
    </div>
  </div>
</div>

<script>
if(!localStorage.getItem('atlas_token'))location='/login';
function logout(){localStorage.removeItem('atlas_token');location='/login'}

let autoTimer, countdownTimer, countdown=10;

function toggleAuto(){
  if(document.getElementById('autoRefresh').checked){startAuto()}else{stopAuto()}
}

function startAuto(){
  countdown=10;
  updateCountdown();
  countdownTimer=setInterval(()=>{
    countdown--;
    updateCountdown();
    if(countdown<=0){refreshAll();countdown=10}
  },1000);
  autoTimer=setInterval(refreshAll,10000);
}

function stopAuto(){
  clearInterval(autoTimer);
  clearInterval(countdownTimer);
  document.getElementById('refreshCountdown').textContent='已停止';
}

function updateCountdown(){
  document.getElementById('refreshCountdown').textContent=countdown+'s';
}

async function refreshAll(){
  await loadAgents();
  await loadLogs();
  countdown=10;
  updateCountdown();
}

async function loadAgents(){
  try{
    const r=await fetch('/api/agents/status');
    const d=await r.json();
    const grid=document.getElementById('agentGrid');
    if(!d.ok||!d.agents){grid.innerHTML='<div class="agent-card"><div style="text-align:center;color:var(--red);padding:20px">加载失败</div></div>';return}

    const icons={quotation:'📋',trade:'🌍',warehouse:'📦',purchasing:'🛒'};
    const labels={quotation:'报价智能体',trade:'外贸智能体',warehouse:'仓储智能体',purchasing:'采购智能体'};
    const colors={quotation:'var(--blue)',trade:'var(--amber)',warehouse:'var(--green)',purchasing:'#8b5cf6'};

    grid.innerHTML=d.agents.map(a=>{
      const cls=a.status==='idle'?'status-idle':a.status==='running'?'status-running':'status-error';
      const dotCls='dot-'+(a.status==='idle'?'idle':a.status==='running'?'running':'error');
      const statusLabel={idle:'空闲',running:'运行中',error:'异常',processing:'处理中'}[a.status]||a.status;
      const icon=icons[a.type]||'🤖';
      return `<div class="agent-card">
        <div class="agent-header">
          <div>
            <div class="name">${icon} ${labels[a.type]||a.name}</div>
            <div class="type">${a.name}</div>
          </div>
          <span class="status-dot ${cls}"><span class="dot ${dotCls}"></span>${statusLabel}</span>
        </div>
        <div class="agent-desc">${a.description||''}</div>
        <div class="agent-stats">
          <div class="stat"><span class="val" style="color:${colors[a.type]||'var(--green)'}">${a.type}</span><span>类型</span></div>
        </div>
      </div>`;
    }).join('');
  }catch(e){console.error(e)}
}

async function loadLogs(){
  try{
    const r=await fetch('/api/history');
    const d=await r.json();
    const el=document.getElementById('logList');
    const data=(d.data||[]).slice(0,10);
    if(!data.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px">暂无活动记录</div>';return}

    const agentColors={quotation:'#dbeafe',trade:'#fef3c7',warehouse:'#d4f5e0',purchasing:'#ede9fe'};
    el.innerHTML=data.map(q=>`<div class="log-entry">
      <span class="log-time">${(q.created_at||'').slice(0,10)||'?'}</span>
      <span class="log-agent" style="background:${agentColors.quotation||'#f0f0f0'};color:var(--text)">报价</span>
      <span class="log-msg">
        <a href="#" onclick="showTrace('${q.id}')" style="color:var(--green)">📋 ${q.id}</a>
        ${q.status?`<span style="font-size:.7rem;color:var(--muted);margin-left:8px">${q.status}</span>`:''}
      </span>
    </div>`).join('');
  }catch(e){console.error(e)}
}

async function triggerEvent(){
  const type=document.getElementById('eventType').value;
  const el=document.getElementById('triggerResult');
  el.textContent='触发中...';

  try{
    const body=type==='inquiry'
      ? {items:[{oe_number:'5264231/5443207',name_cn:'曲轴',quantity:2,list_price:1106.12}]}
      : {items:[{oe_number:'5264231/5443207',quantity:2}]};

    const r=await fetch('/api/trigger-event',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    el.textContent=d.ok?'✅ 事件已触发':'❌ '+d.error;
    setTimeout(()=>el.textContent='',4000);
    refreshAll();
  }catch(e){el.textContent='❌ 网络错误'}
}

function showTrace(id){
  fetch('/api/trace/'+id).then(r=>r.json()).then(d=>{
    const steps=(d.data||[]).map(s=>s.step+': '+s.agent+' → '+(s.decision||'OK')).join('\n');
    alert('审计链:\n\n'+steps.slice(0,600));
  });
}

refreshAll();
startAuto();
</script></body></html>
