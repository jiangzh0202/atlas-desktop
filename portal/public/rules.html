<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>规则面板 · 元策擎天</title><style>:root{--bg:#f2f2f4;--card:#fff;--green:#7ecf5e;--text:#1a1a2e;--muted:#888;--red:#e94560}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.topbar{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06)}.topbar .logo{font-size:1.1rem;font-weight:700}.topbar .logo span{color:var(--green)}.topbar a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:8px}.container{max-width:900px;margin:0 auto;padding:20px}.card{background:var(--card);border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card h2{font-size:1.05rem;margin-bottom:14px}.btn{display:inline-block;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:none}.btn-p{background:var(--green);color:#fff}.btn-s{background:var(--bg);color:var(--text);border:1px solid #ddd}input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:.9rem;outline:none}input:focus{border-color:var(--green)}table{width:100%;border-collapse:collapse;font-size:.82rem}th{background:var(--bg);padding:8px 10px;text-align:left}td{padding:8px 10px;border-bottom:1px solid #f0f0f0}.empty{padding:40px;text-align:center;color:var(--muted)}</style></head><body><div class="topbar"><div class="logo"><a href="/" style="text-decoration:none;color:inherit"><span>元策</span>·擎天</a></div><div><a href="/">首页</a><a href="/quotation">报价</a><a href="/parts">配件</a><a href="/customers">客户</a><a href="/rules">规则</a><a href="/history">历史</a><a href="/stock">📦库存</a><a href="/agents">🤖智能体</a><a href="#" onclick="logout()">退出</a></div></div><div class="container"><div class="card"><h2>📐 规则面板</h2><p style="color:var(--muted);font-size:.8rem;margin-bottom:10px">用大白话写规则，保存即生效。老板自己能改。</p><textarea id="content" style="width:100%;height:400px;font-family:monospace;font-size:.82rem;padding:14px;border:1px solid #ddd;border-radius:10px" placeholder="加载中..."></textarea><div style="margin-top:12px;display:flex;gap:10px"><button class="btn btn-p" onclick="save()">💾 保存</button><button class="btn btn-s" onclick="load()">刷新</button> <span id="msg" style="color:var(--green);font-size:.85rem;align-self:center"></span></div></div></div><script>if(!localStorage.getItem('atlas_token'))location='/login';function logout(){localStorage.removeItem('atlas_token');location='/login'}</script><script>async function load(){const r=await fetch('/api/rules');const d=await r.json();document.getElementById('content').value=d.raw||''}async function save(){const r=await fetch('/api/rules',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:document.getElementById('content').value})});const d=await r.json();document.getElementById('msg').textContent=d.ok?'✅ 已保存':'❌ 保存失败: '+d.error;setTimeout(()=>document.getElementById('msg').textContent='',3000)}load()</script></body></html>
