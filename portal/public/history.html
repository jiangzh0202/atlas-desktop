<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>报价历史 · 元策擎天</title>
<style>
:root{--bg:#f2f2f4;--card:#fff;--green:#7ecf5e;--green-soft:#e8f7e0;--text:#1a1a2e;--muted:#888;--red:#e94560;--amber:#f59e0b;--blue:#3b82f6;--line:rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--green);text-decoration:none}
.topbar{background:var(--card);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar .logo{font-size:1.2rem;font-weight:700}
.topbar .logo span{color:var(--green)}
.topbar nav{display:flex;gap:4px;flex-wrap:wrap}
.topbar nav a{color:var(--muted);text-decoration:none;font-size:.82rem;padding:6px 12px;border-radius:8px;transition:all .15s}
.topbar nav a:hover,.topbar nav a.active{background:var(--green-soft);color:var(--green)}
.container{max-width:1040px;margin:0 auto;padding:20px 24px}
.card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px;border:1px solid var(--line)}
.card h2{font-size:1.05rem;margin-bottom:14px}
/* Search bar */
.search-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:8px 12px;border:1px solid #ddd;border-radius:10px;font-size:.85rem;outline:none}
.search-bar input:focus,.search-bar select:focus{border-color:var(--green)}
.search-bar input{flex:1;min-width:180px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid #eee;white-space:nowrap;cursor:pointer}
th:hover{background:#e8e8ea}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafafa}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.7rem;font-weight:600}
.tag-ok{background:#d4f5e0;color:#0d7a3e}
.tag-warn{background:#fef3c7;color:#92400e}
.tag-err{background:#fee2e2;color:#991b1b}
.tag-draft{background:#f0f0f0;color:#666}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-p{background:var(--green);color:#fff}
.btn-p:hover{opacity:.9}
.btn-s{background:var(--bg);color:var(--text);border:1px solid #ddd}
.btn-s:hover{background:#e8e8ea}
.btn-xs{padding:4px 10px;font-size:.75rem}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-box h3{font-size:1.05rem;margin-bottom:12px}
.modal-box .close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);padding:4px 8px}
/* Steps */
.trace-step{padding:10px 14px;margin:6px 0;border-radius:10px;font-size:.82rem;border:1px solid var(--line);display:flex;align-items:center;gap:10px}
.trace-step .step-icon{font-size:1.2rem}
.trace-step .step-body{flex:1}
.trace-step .step-agent{font-size:.7rem;color:var(--muted)}
/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px}
.pagination button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:var(--card);cursor:pointer;font-size:.82rem}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination button.active{background:var(--green);color:#fff;border-color:var(--green)}
.pagination span{font-size:.82rem;color:var(--muted)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:.85rem}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style></head>
<body>
<div class="topbar">
  <div class="logo"><span>元策</span>·擎天</div>
  <nav>
    <a href="/">📊 首页</a>
    <a href="/quotation">📋 报价</a>
    <a href="/parts">🔧 配件</a>
    <a href="/customers">👥 客户</a>
    <a href="/rules">📐 规则</a>
    <a href="/history" class="active">📜 历史</a>
    <a href="/stock">📦 库存</a>
    <a href="/agents">🤖 智能体</a>
    <a href="/trade">🌍 贸易</a>
    <a href="#" onclick="logout()" style="color:var(--red)">退出</a>
  </nav>
</div>

<div class="container">
  <div class="card">
    <h2>📜 报价历史</h2>
    <div class="search-bar">
      <input id="searchQ" placeholder="搜索 报价ID / 客户名 / OE号..." onkeyup="debounceSearch()">
      <select id="statusFilter" onchange="loadHistory()">
        <option value="">全部状态</option>
        <option value="approved">已批准</option>
        <option value="draft">草稿</option>
        <option value="rejected">已拒绝</option>
        <option value="archived">已归档</option>
      </select>
      <button class="btn btn-s" onclick="loadHistory()">🔍 筛选</button>
    </div>
    <div id="historyTable"><div class="empty"><span class="spinner"></span>加载中...</div></div>
    <div id="pagination" class="pagination"></div>
  </div>
</div>

<!-- Trace Modal -->
<div class="modal-overlay" id="traceModal">
  <div class="modal-box">
    <button class="close" onclick="closeTrace()">✕</button>
    <h3>🔍 AI 计算链</h3>
    <div id="traceContent"><div class="empty">加载中...</div></div>
  </div>
</div>

<script>
if(!localStorage.getItem('atlas_token'))location='/login';
function logout(){localStorage.removeItem('atlas_token');location='/login'}

let allData=[], page=1, pageSize=15;
let searchTimer;

async function loadHistory(){
  const el=document.getElementById('historyTable');
  el.innerHTML='<div class="empty"><span class="spinner"></span>加载中...</div>';
  try{
    const r=await fetch('/api/history');
    const d=await r.json();
    if(!d.ok){el.innerHTML='<div class="empty">加载失败: '+d.error+'</div>';return}

    allData=d.data||[];
    applyFilters();
  }catch(e){el.innerHTML='<div class="empty">网络错误</div>'}
}

function applyFilters(){
  const q=(document.getElementById('searchQ').value||'').toLowerCase();
  const status=document.getElementById('statusFilter').value;

  let filtered=allData;
  if(q) filtered=filtered.filter(r=>(r.id||'').toLowerCase().includes(q)||(r.customer_name||'').toLowerCase().includes(q));
  if(status) filtered=filtered.filter(r=>r.status===status);

  page=Math.min(page,Math.ceil(filtered.length/pageSize)||1);
  renderTable(filtered);
}

function renderTable(data){
  const el=document.getElementById('historyTable');
  if(!data.length){el.innerHTML='<div class="empty">📭 暂无报价记录<br><span style="font-size:.75rem">完成一笔报价后这里就会出现记录</span></div>';renderPagination(0);return}

  const start=(page-1)*pageSize, end=start+pageSize;
  const pageData=data.slice(start,end);

  const statusMap={approved:{label:'已批准',cls:'tag-ok'},draft:{label:'草稿',cls:'tag-draft'},
    rejected:{label:'已拒绝',cls:'tag-err'},waiting_human:{label:'待审核',cls:'tag-warn'},
    archived:{label:'已归档',cls:'tag-draft'}};

  el.innerHTML='<table><tr><th>报价ID</th><th>日期</th><th>客户</th><th>配件数</th><th>总额</th><th>状态</th><th>操作</th></tr>'+
    pageData.map(q=>{
      const s=statusMap[q.status]||{label:q.status||'未知',cls:'tag-draft'};
      const date=q.created_at?q.created_at.slice(0,10):'-';
      const amount=q.total_amount?'¥'+Number(q.total_amount).toLocaleString():'-';
      return `<tr>
        <td style="font-family:monospace;font-size:.78rem">${q.id||'-'}</td>
        <td>${date}</td>
        <td>${q.customer_name||'-'}</td>
        <td>${q.item_count||q.line_count||0}</td>
        <td style="font-weight:600">${amount}</td>
        <td><span class="tag ${s.cls}">${s.label}</span></td>
        <td>
          <button class="btn btn-s btn-xs" onclick="showTrace('${q.id}')">🔍 AI怎么算的</button>
          ${q.status==='approved'?`<a class="btn btn-p btn-xs" style="margin-left:4px" href="/api/quote/${q.id}/export">📥 导出</a>`:''}
        </td>
      </tr>`;
    }).join('')+'</table>';

  renderPagination(data.length);
}

function renderPagination(total){
  const el=document.getElementById('pagination');
  const totalPages=Math.ceil(total/pageSize);
  if(totalPages<=1){el.innerHTML='';return}

  let h='<button onclick="goPage('+(page-1)+')" '+(page<=1?'disabled':'')+'>‹ 上一页</button>';
  h+='<span>'+page+' / '+totalPages+'</span>';
  h+='<button onclick="goPage('+(page+1)+')" '+(page>=totalPages?'disabled':'')+'>下一页 ›</button>';
  el.innerHTML=h;
}

function goPage(p){page=p;applyFilters()}
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300)}

// Trace Modal
async function showTrace(id){
  document.getElementById('traceModal').classList.add('show');
  document.getElementById('traceContent').innerHTML='<div class="empty"><span class="spinner"></span>加载中...</div>';
  try{
    const r=await fetch('/api/trace/'+id);
    const d=await r.json();
    const steps=d.data||[];
    const icons={match:'🔧',price:'💰',completed:'✅',stock_deduct:'📦',stock_alert:'⚠️',purchase_suggest:'🛒'};
    document.getElementById('traceContent').innerHTML=steps.length
      ? steps.map(s=>`<div class="trace-step">
          <div class="step-icon">${icons[s.step]||'•'}</div>
          <div class="step-body">
            <div style="font-weight:600">${s.step||'?'}</div>
            <div class="step-agent">${s.agent||''} → ${s.decision||'OK'}</div>
            ${s.notes?`<div style="font-size:.75rem;color:var(--muted);margin-top:2px">${s.notes}</div>`:''}
          </div>
        </div>`).join('')
      : '<div class="empty">暂无审计记录</div>';
  }catch(e){document.getElementById('traceContent').innerHTML='<div class="empty">加载失败</div>'}
}
function closeTrace(){document.getElementById('traceModal').classList.remove('show')}
// Click outside to close
document.getElementById('traceModal').addEventListener('click',function(e){if(e.target===this)closeTrace()});

loadHistory();
</script></body></html>
