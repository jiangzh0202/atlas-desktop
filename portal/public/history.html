<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>报价历史 · 元策擎天</title><style>:root{--bg:#f2f2f4;--card:#fff;--green:#7ecf5e;--text:#1a1a2e;--muted:#888;--red:#e94560}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.topbar{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06)}.topbar .logo{font-size:1.1rem;font-weight:700}.topbar .logo span{color:var(--green)}.topbar a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:8px}.container{max-width:900px;margin:0 auto;padding:20px}.card{background:var(--card);border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card h2{font-size:1.05rem;margin-bottom:14px}.btn{display:inline-block;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:none}.btn-p{background:var(--green);color:#fff}.btn-s{background:var(--bg);color:var(--text);border:1px solid #ddd}input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:.9rem;outline:none}input:focus{border-color:var(--green)}table{width:100%;border-collapse:collapse;font-size:.82rem}th{background:var(--bg);padding:8px 10px;text-align:left}td{padding:8px 10px;border-bottom:1px solid #f0f0f0}.empty{padding:40px;text-align:center;color:var(--muted)}</style></head><body><div class="topbar"><div class="logo"><a href="/" style="text-decoration:none;color:inherit"><span>元策</span>·擎天</a></div><div><a href="/">首页</a><a href="/quotation">报价</a><a href="/parts">配件</a><a href="/customers">客户</a><a href="/rules">规则</a><a href="/history">历史</a><a href="/stock">📦库存</a><a href="/agents">🤖智能体</a><a href="#" onclick="logout()">退出</a></div></div><div class="container"><div class="card"><h2>📊 报价历史</h2><div id="list"></div></div></div><script>if(!localStorage.getItem('atlas_token'))location='/login';function logout(){localStorage.removeItem('atlas_token');location='/login'}</script><script>fetch('/api/history').then(r=>r.json()).then(d=>{const el=document.getElementById('list');if(!d.data||!d.data.length){el.innerHTML='<div class="empty">暂无报价记录</div>';return}el.innerHTML=d.data.map(id=>`<div style="padding:10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between"><span>📋 ${id}</span><a href="#" onclick="showTrace('${id}')" style="color:var(--green)">AI怎么算的</a></div>`).join('')});function showTrace(id){fetch('/api/trace/'+id).then(r=>r.json()).then(d=>{alert(JSON.stringify(d.data,null,2).slice(0,500))})}</script></body></html>
