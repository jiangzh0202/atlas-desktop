<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>外贸工具 · 元策擎天</title>
<style>
:root{--bg:#f2f2f4;--card:#fff;--green:#7ecf5e;--text:#1a1a2e;--muted:#888;--red:#e94560;--amber:#f59e0b;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar .logo{font-size:1.1rem;font-weight:700}
.topbar .logo a{text-decoration:none;color:inherit}
.topbar .logo span{color:var(--green)}
.topbar nav a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:8px}
.topbar nav a:hover{color:var(--text)}
.container{max-width:960px;margin:0 auto;padding:20px}
.card{background:var(--card);border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:1.05rem;margin-bottom:14px;color:var(--text)}
.card h3{font-size:.9rem;color:var(--text);margin-bottom:8px}
.btn{display:inline-block;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;text-align:center;transition:all .15s}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{opacity:.9}
.btn-s{background:var(--bg);color:var(--text);border:1px solid #ddd}.btn-s:hover{background:#e8e8ea}
.btn-r{background:var(--red);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
input,textarea,select{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;min-height:100px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--bg);padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #eee}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.7rem;font-weight:600}
.tag-ok{background:#d4f5e0;color:#0d7a3e}
.tag-warn{background:#fef3cd;color:#8a6d14}
.tag-err{background:#fde2e2;color:#a71d2a}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:.85rem}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;color:#fff;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-ok{background:var(--green)}
.toast-err{background:var(--red)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.steps{display:flex;gap:8px;margin-bottom:18px}
.step{flex:1;text-align:center;padding:10px 8px;border-radius:10px;font-size:.78rem;color:var(--muted);background:var(--bg);transition:all .2s}
.step.active{background:var(--green);color:#fff;font-weight:600}
.step.done{background:#d4f5e0;color:#0d7a3e}
.result-box{background:var(--bg);border-radius:10px;padding:16px;font-size:.82rem;line-height:1.7;max-height:400px;overflow-y:auto;white-space:pre-wrap;color:var(--text);margin-top:12px;font-family:inherit}
.result-box.pi{font-family:"Courier New",monospace;font-size:.78rem;background:#fafbf7;border:1px solid #e8f7e2}
.action-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
.lang-select{width:auto;min-width:100px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><a href="/"><span>元策</span>·擎天</a></div>
  <nav>
    <a href="/">首页</a><a href="/quotation">报价</a><a href="/parts">配件</a><a href="/customers">客户</a><a href="/rules">规则</a><a href="/history">历史</a><a href="/stock">📦库存</a><a href="/agents">🤖智能体</a><a href="/trade">🌍贸易</a><a href="#" onclick="logout()">退出</a>
  </nav>
</div>

<div class="container">

<div class="steps">
  <div class="step active" id="step1">① 输入询盘</div>
  <div class="step" id="step2">② 翻译</div>
  <div class="step" id="step3">③ 提取明细</div>
  <div class="step" id="step4">④ 生成PI</div>
  <div class="step" id="step5">⑤ 下载</div>
</div>

<div class="card" id="inquiryCard">
  <h2>📝 输入询盘</h2>
  <p style="color:var(--muted);font-size:.8rem;margin-bottom:10px">粘贴客户询盘文本（支持俄语、英语），AI 将自动翻译、提取配件并生成 PI。</p>
  <textarea id="inquiryText" placeholder="例如：Головка блока цилиндров ISF3.8 — 2 шт.
或：I need Cummins injector 4025138, 50 units, FOB Shanghai."></textarea>
  <div class="action-row">
    <select id="sourceLang" class="lang-select">
      <option value="auto">自动检测语言</option>
      <option value="ru">俄语</option>
      <option value="en">英语</option>
      <option value="zh">中文</option>
    </select>
    <button class="btn btn-p" onclick="translateInquiry()">🌐 翻译</button>
    <button class="btn btn-p" onclick="processAll()" style="background:var(--blue)">⚡ 一键处理</button>
  </div>
</div>

<div class="card" id="translateCard" style="display:none">
  <h2>🌐 翻译结果</h2>
  <div id="translateLoading" style="display:none;color:var(--muted)"><span class="spin"></span>AI 翻译中...</div>
  <div class="result-box" id="translatedText"></div>
  <div class="action-row">
    <button class="btn btn-p" onclick="extractItems()">🔍 提取配件明细</button>
    <button class="btn btn-s" onclick="resetAll()">重新输入</button>
  </div>
</div>

<div class="card" id="extractCard" style="display:none">
  <h2>📋 提取配件明细 <span id="extractCount" style="font-size:.8rem;color:var(--muted);font-weight:400"></span></h2>
  <div id="extractLoading" style="display:none;color:var(--muted)"><span class="spin"></span>AI 提取中...</div>
  <div id="itemsTable"></div>
  <div class="action-row">
    <button class="btn btn-p" onclick="generatePIDraft()">📄 生成 PI 草稿</button>
    <button class="btn btn-s" onclick="editItems()">✏️ 编辑明细</button>
  </div>
</div>

<div class="card" id="piCard" style="display:none">
  <h2>📄 PI 草稿 (Proforma Invoice)</h2>
  <div id="piLoading" style="display:none;color:var(--muted)"><span class="spin"></span>AI 生成 PI 中...</div>
  <div class="result-box pi" id="piContent"></div>
  <div class="action-row">
    <button class="btn btn-p" onclick="downloadPI()">📥 下载 PI (文本)</button>
    <button class="btn btn-s" onclick="copyPI()">📋 复制</button>
    <button class="btn btn-s" onclick="resetAll()">🔄 新建</button>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('atlas_token');
if (!token) location = '/login';
function auth() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
function logout() { localStorage.removeItem('atlas_token'); location = '/login'; }

let translatedText = '';
let extractedItems = [];
let piDraft = '';
let inquiryText = '';
let sourceLang = 'auto';

function setStep(n) {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('step' + i);
    el.classList.remove('active', 'done');
    if (i === n) el.classList.add('active');
    if (i < n) el.classList.add('done');
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function translateInquiry() {
  inquiryText = document.getElementById('inquiryText').value.trim();
  sourceLang = document.getElementById('sourceLang').value;
  if (!inquiryText) { showToast('请输入询盘文本', 'err'); return; }
  document.getElementById('translateCard').style.display = '';
  document.getElementById('translateLoading').style.display = '';
  document.getElementById('translatedText').textContent = '';
  setStep(2);
  try {
    const r = await fetch('/api/translate', {
      method: 'POST', headers: auth(),
      body: JSON.stringify({ text: inquiryText, source_lang: sourceLang, target_lang: 'zh' })
    });
    const d = await r.json();
    document.getElementById('translateLoading').style.display = 'none';
    if (!d.ok) {
      document.getElementById('translatedText').textContent = '❌ 翻译失败：' + (d.error || '未知错误');
      showToast('翻译失败', 'err'); return;
    }
    translatedText = d.translated;
    document.getElementById('translatedText').textContent = translatedText;
    setStep(2);
    showToast('翻译完成', 'ok');
  } catch (e) {
    document.getElementById('translateLoading').style.display = 'none';
    document.getElementById('translatedText').textContent = '❌ 网络错误：' + e.message;
    showToast('连接失败，请检查服务', 'err');
  }
}

async function extractItems() {
  if (!translatedText) { showToast('请先翻译', 'err'); return; }
  document.getElementById('extractCard').style.display = '';
  document.getElementById('extractLoading').style.display = '';
  document.getElementById('itemsTable').innerHTML = '';
  setStep(3);
  try {
    const r = await fetch('/api/inquiry/process', {
      method: 'POST', headers: auth(),
      body: JSON.stringify({ text: inquiryText, language: sourceLang, customer: '' })
    });
    const d = await r.json();
    document.getElementById('extractLoading').style.display = 'none';
    if (!d.ok) {
      document.getElementById('itemsTable').innerHTML = '<div class="empty">❌ 提取失败：' + (d.error || '未知错误') + '</div>';
      showToast('提取失败', 'err'); return;
    }
    extractedItems = d.data.extracted_items || [];
    if (!extractedItems.length) {
      document.getElementById('itemsTable').innerHTML = '<div class="empty">未提取到配件信息</div>';
      showToast('未找到配件', 'warn'); return;
    }
    renderItemsTable(extractedItems);
    document.getElementById('extractCount').textContent = '共 ' + extractedItems.length + ' 项';
    setStep(3);
    showToast('提取到 ' + extractedItems.length + ' 项配件', 'ok');
  } catch (e) {
    document.getElementById('extractLoading').style.display = 'none';
    document.getElementById('itemsTable').innerHTML = '<div class="empty">❌ 网络错误：' + e.message + '</div>';
    showToast('连接失败', 'err');
  }
}

function renderItemsTable(items) {
  let html = '<table><thead><tr><th>#</th><th>OE号</th><th>品名</th><th>数量</th><th>单位</th></tr></thead><tbody>';
  items.forEach((item, i) => {
    html += '<tr><td>' + (i + 1) + '</td><td><strong>' + esc(item.oe_number || '-') + '</strong></td><td>' + esc(item.name || '-') + '</td><td>' + (item.quantity || 1) + '</td><td>' + esc(item.unit || 'PC') + '</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('itemsTable').innerHTML = html;
}

function editItems() {
  if (!extractedItems.length) { showToast('无明细可编辑', 'err'); return; }
  let html = '<table><thead><tr><th>#</th><th>OE号</th><th>品名</th><th>数量</th><th>单位</th></tr></thead><tbody>';
  extractedItems.forEach((item, i) => {
    html += '<tr><td>' + (i + 1) + '</td><td><input value="' + esc(item.oe_number || '') + '" onchange="extractedItems[' + i + '].oe_number=this.value" style="width:120px"></td><td><input value="' + esc(item.name || '') + '" onchange="extractedItems[' + i + '].name=this.value"></td><td><input type="number" value="' + (item.quantity || 1) + '" onchange="extractedItems[' + i + '].quantity=parseInt(this.value)||1" style="width:70px"></td><td><input value="' + esc(item.unit || 'PC') + '" onchange="extractedItems[' + i + '].unit=this.value" style="width:70px"></td></tr>';
  });
  html += '</tbody></table>';
  html += '<div class="action-row"><button class="btn btn-p" onclick="saveEditedItems()">💾 保存修改</button></div>';
  document.getElementById('itemsTable').innerHTML = html;
}

function saveEditedItems() {
  renderItemsTable(extractedItems);
  showToast('明细已更新', 'ok');
}

async function generatePIDraft() {
  if (!extractedItems.length) { showToast('请先提取配件明细', 'err'); return; }
  document.getElementById('piCard').style.display = '';
  document.getElementById('piLoading').style.display = '';
  document.getElementById('piContent').textContent = '';
  setStep(4);
  try {
    const r = await fetch('/api/pi/generate', {
      method: 'POST', headers: auth(),
      body: JSON.stringify({ inquiry_text: inquiryText, items: extractedItems, customer_name: '', trade_term: 'FOB', payment_term: 'prepaid', currency: 'USD' })
    });
    const d = await r.json();
    document.getElementById('piLoading').style.display = 'none';
    if (!d.ok) {
      document.getElementById('piContent').textContent = '❌ PI 生成失败：' + (d.error || '未知错误');
      showToast('PI 生成失败', 'err'); return;
    }
    piDraft = d.pi_draft;
    document.getElementById('piContent').textContent = piDraft;
    setStep(4);
    showToast('PI 草稿已生成', 'ok');
  } catch (e) {
    document.getElementById('piLoading').style.display = 'none';
    document.getElementById('piContent').textContent = '❌ 网络错误：' + e.message;
    showToast('连接失败', 'err');
  }
}

function downloadPI() {
  if (!piDraft) { showToast('请先生成 PI', 'err'); return; }
  const blob = new Blob(['\uFEFF' + piDraft], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0, 10);
  a.download = 'PI_Draft_' + date + '.txt';
  a.click();
  setStep(5);
  showToast('PI 已下载', 'ok');
}

function copyPI() {
  if (!piDraft) { showToast('请先生成 PI', 'err'); return; }
  navigator.clipboard.writeText(piDraft).then(() => showToast('已复制到剪贴板', 'ok')).catch(() => showToast('复制失败，请手动选中复制', 'err'));
}

async function processAll() {
  inquiryText = document.getElementById('inquiryText').value.trim();
  sourceLang = document.getElementById('sourceLang').value;
  if (!inquiryText) { showToast('请输入询盘文本', 'err'); return; }
  showToast('AI 处理中...', 'ok');
  document.getElementById('translateCard').style.display = '';
  document.getElementById('translateLoading').style.display = '';
  document.getElementById('translatedText').textContent = '';
  document.getElementById('extractCard').style.display = '';
  document.getElementById('extractLoading').style.display = '';
  document.getElementById('itemsTable').innerHTML = '';
  document.getElementById('piCard').style.display = '';
  document.getElementById('piLoading').style.display = '';
  document.getElementById('piContent').textContent = '';
  try {
    const r = await fetch('/api/inquiry/process', {
      method: 'POST', headers: auth(),
      body: JSON.stringify({ text: inquiryText, language: sourceLang, customer: '' })
    });
    const d = await r.json();
    document.getElementById('translateLoading').style.display = 'none';
    document.getElementById('extractLoading').style.display = 'none';
    document.getElementById('piLoading').style.display = 'none';
    if (!d.ok) { showToast('处理失败：' + (d.error || '未知错误'), 'err'); return; }
    const data = d.data;
    translatedText = data.translated_text || '';
    extractedItems = data.extracted_items || [];
    piDraft = data.pi_draft || '';
    document.getElementById('translatedText').textContent = translatedText || '(原文已是中文，无需翻译)';
    setStep(2);
    if (extractedItems.length) { renderItemsTable(extractedItems); document.getElementById('extractCount').textContent = '共 ' + extractedItems.length + ' 项'; }
    else { document.getElementById('itemsTable').innerHTML = '<div class="empty">未提取到配件信息</div>'; }
    setStep(3);
    if (piDraft) { document.getElementById('piContent').textContent = piDraft; setStep(4); }
    else { document.getElementById('piContent').textContent = '(未生成 PI — 可能缺少配件明细或价格数据)'; }
    showToast('处理完成：' + extractedItems.length + ' 项配件', 'ok');
  } catch (e) {
    document.getElementById('translateLoading').style.display = 'none';
    document.getElementById('extractLoading').style.display = 'none';
    document.getElementById('piLoading').style.display = 'none';
    showToast('连接失败：' + e.message, 'err');
  }
}

function resetAll() {
  translatedText = ''; extractedItems = []; piDraft = '';
  document.getElementById('translateCard').style.display = 'none';
  document.getElementById('extractCard').style.display = 'none';
  document.getElementById('piCard').style.display = 'none';
  document.getElementById('translatedText').textContent = '';
  document.getElementById('itemsTable').innerHTML = '';
  document.getElementById('piContent').textContent = '';
  document.getElementById('extractLoading').style.display = 'none';
  document.getElementById('translateLoading').style.display = 'none';
  document.getElementById('piLoading').style.display = 'none';
  setStep(1);
}

function esc(s) {
  if (!s && s !== 0) return '-';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
