name: Build Atlas
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Build
        run: npm install && npm run tauri:build:win
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-Windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Build
        run: npm install && npm run tauri:build:mac-arm
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-macOS-AppleSilicon
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust + Intel target
        run: |
          rustup update stable && rustup default stable
          rustup target add x86_64-apple-darwin
      - name: Build
        run: npm install && npm run tauri:build:mac-intel
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-macOS-Intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Atlas-Windows-x64
          path: artifacts/win
      - uses: actions/download-artifact@v4
        with:
          name: Atlas-macOS-AppleSilicon
          path: artifacts/mac-arm
      - uses: actions/download-artifact@v4
        with:
          name: Atlas-macOS-Intel
          path: artifacts/mac-intel
      - name: List artifacts
        run: find artifacts -type f -ls
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/win/**/*
            artifacts/mac-arm/**/*
            artifacts/mac-intel/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
