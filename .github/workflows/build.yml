name: Build Atlas Desktop
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Build
        run: npm install && npm run tauri:build:win
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Build
        run: npm install && npm run tauri:build:mac-arm
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-macOS-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Build
        run: npm install && npm run tauri build -- --bundles appimage
      - uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-artifacts
      - name: Show artifacts
        run: find release-artifacts -type f -ls
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
